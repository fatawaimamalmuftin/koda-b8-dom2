<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM1</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: black;
            background-color: aliceblue;
            gap: 25px;
        }

        .card {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background-color: blueviolet;
            color: black;
            border: 5px solid black;
            border-radius: 16px;
            margin-top: 15px;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Konversi Suhu</h1>

        <input class="card" type="number" id="suhu" placeholder="Masukkan suhu" style="background-color: aliceblue;">



        <select class="card" id="jenis">
            <option value="f">Celcius ke Fahrenheit</option>
            <option value="k">Celcius ke Kelvin</option>
        </select>

        <button class="card" id="btnKonversi"
            style="background-color: greenyellow; width: 70px;height: 30px;justify-content: center;align-items: center;">
            Tombol
        </button>

        <p class="card" id="hasil"
            style="justify-content: center;align-items: center;width: 200px;height: 50px;background-color: aliceblue;">
            Hasil
        </p>
    </div>

    <script>
        const suhuInput = document.querySelector("#suhu");
        const jenisKonversi = document.querySelector("#jenis");
        const tombol = document.querySelector("#btnKonversi");
        const hasil = document.querySelector("#hasil");

        function celsiusKeFahrenheit(celsius) {
            return (celsius * 9 / 5) + 32;
        }

        function celsiusKeKelvin(celsius) {
            return celsius + 273.15;
        }

        tombol.addEventListener("click", () => {

            const suhu = parseInt(suhuInput.value);
            const jenis = jenisKonversi.value;

            if (jenis === "f") {
                hasil.textContent =
                    `${suhu} °C = ${celsiusKeFahrenheit(suhu)}°F`;
            } else {
                hasil.textContent =
                    `${suhu}°C = ${celsiusKeKelvin(suhu)} K`;
            }

        });
    </script>

</body>

</html>
